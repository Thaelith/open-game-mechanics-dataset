name: Validate Dataset

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate mechanic files
        run: python tools/validate_dataset.py

      - name: Check generated index
        run: python tools/generate_index.py --check

      - name: Check local documentation links
        run: python tools/check_links.py

      - name: Run advisory generic lint
        run: python tools/generic_lint.py --limit 50

      - name: Print category coverage report
        run: python tools/category_coverage_report.py --json

      - name: Validate mechanic graph
        run: python tools/check_mechanic_graph.py

      - name: Print mechanic graph coverage report
        run: python tools/mechanic_graph_report.py --json

      - name: Check static site JavaScript
        run: |
          node --check site/mixer-analysis.js
          node --check site/app.js

      - name: Test Mechanic Mixer analysis
        run: node tools/test_mixer_analysis.mjs

      - name: Smoke test dataset search
        run: python tools/search_dataset.py --query jump_assist --limit 5
